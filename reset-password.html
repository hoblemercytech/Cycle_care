<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff5fa2">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Reset Password | CycleCare</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Inter,Arial,sans-serif;
      background:linear-gradient(135deg,#fff7fc,#fce7f3);
      color:#1E1B4B;
      padding:20px;
    }
    .card{
      width:100%;
      max-width:420px;
      background:rgba(255,255,255,.9);
      border-radius:28px;
      padding:34px;
      box-shadow:0 30px 80px -25px rgba(139,92,246,.35);
    }
    h1{margin:0 0 10px;font-size:28px}
    p{color:#6B7280;line-height:1.6}
    label{display:block;margin:18px 0 8px;font-weight:700}
    input{
      width:100%;
      padding:15px;
      border-radius:16px;
      border:1.5px solid rgba(139,92,246,.18);
      font-size:15px;
      box-sizing:border-box;
    }
    button{
      width:100%;
      margin-top:22px;
      padding:15px;
      border:0;
      border-radius:999px;
      background:linear-gradient(120deg,#EC4899,#8B5CF6);
      color:white;
      font-weight:800;
      font-size:15px;
      cursor:pointer;
    }
    .msg{margin-top:16px;font-weight:700}
  </style>
</head>
<body>
  <div class="card">
    <h1>Create New Password</h1>
    <p>Enter a new secure password for your CycleCare account.</p>

    <label>New Password</label>
    <input type="password" id="password" placeholder="New password" />

    <label>Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Confirm password" />

    <button id="updatePasswordBtn">Update Password</button>
    <div class="msg" id="message"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://ssyaklpnjhoxukfanyxb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzeWFrbHBuamhveHVrZmFueXhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNjA2NzUsImV4cCI6MjA5NjczNjY3NX0.H95B092ZXEAQz3l6-QefzWt44RZLpp5PdiEbLktstGE';

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const btn = document.getElementById('updatePasswordBtn');
    const msg = document.getElementById('message');

    btn.addEventListener('click', async () => {
      const password = document.getElementById('password').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();

      if (!password || !confirmPassword) {
        msg.style.color = '#EF4444';
        msg.textContent = 'Please fill all fields.';
        return;
      }

      if (password.length < 6) {
        msg.style.color = '#EF4444';
        msg.textContent = 'Password must be at least 6 characters.';
        return;
      }

      if (password !== confirmPassword) {
        msg.style.color = '#EF4444';
        msg.textContent = 'Passwords do not match.';
        return;
      }

      const { error } = await supabaseClient.auth.updateUser({
  password: password
});

if (error) {
  msg.style.color = '#EF4444';
  msg.textContent = error.message;
  return;
}

// Get current user
const {
  data: { user }
} = await supabaseClient.auth.getUser();

// Send password changed email
if (user) {
  supabaseClient.functions
    .invoke('send-transactional-email', {
      body: {
        type: 'password_changed',
        userId: user.id
      }
    })
    .catch((emailError) => {
      console.error('Password changed email error:', emailError);
    });
}

msg.style.color = '#22C55E';
msg.textContent = 'Password updated successfully. Redirecting...';

setTimeout(() => {
  window.location.href = 'auth.html';
}, 1500);
    });
  </script>
</body>
</html>
